# YC-хост: nginx -> eduproxy (edu-llm.bularond.ru -> 127.0.0.1:4000)
#
# eduproxy — OpenAI-совместимый API. Защита: мастер-ключ (Bearer) на каждый запрос.
# TLS обязателен, т.к. ключ идёт по сети.
#
# Установка:
#   sudo cp nginx/edu-llm.bularond.ru.conf /etc/nginx/sites-available/edu-llm.bularond.ru
#   sudo ln -s /etc/nginx/sites-available/edu-llm.bularond.ru /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d edu-llm.bularond.ru

server {
    listen 80;
    listen [::]:80;
    server_name edu-llm.bularond.ru;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:4000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-стриминг ответов модели: без буферизации, большие таймауты.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering    off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # (Опционально) ограничить доступ, если LiteLLM снаружи нужен только тебе:
        # allow <твой IP>;
        # deny all;
    }
}
