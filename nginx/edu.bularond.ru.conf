# Reverse proxy для Open WebUI: edu.bularond.ru -> 127.0.0.1:3001
#
# Установка на хосте:
#   sudo cp nginx/edu.bularond.ru.conf /etc/nginx/sites-available/edu.bularond.ru
#   sudo ln -s /etc/nginx/sites-available/edu.bularond.ru /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d edu.bularond.ru      # выпустит TLS и добавит 443/редирект
#
# certbot сам допишет ssl_* строки и HTTP->HTTPS редирект, не трогая proxy-настройки ниже.

server {
    listen 80;
    listen [::]:80;
    server_name edu.bularond.ru;

    # Загрузка файлов в чат (документы для RAG). Подними при необходимости.
    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:3001;

        # WebSocket — без этого чат Open WebUI не стримит ответы и «висит».
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Проброс реального адреса/схемы, чтобы приложение строило корректные ссылки.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Ответы модели идут долго (особенно с reasoning) — большие таймауты,
        # иначе nginx рвёт соединение на середине ответа (504).
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_buffering       off;   # стриминг токенов без задержки
    }
}
