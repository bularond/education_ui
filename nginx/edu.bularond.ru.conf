# Reverse proxy для LiteLLM (LLM-хост): edu.bularond.ru -> 127.0.0.1:4000
#
# Это OpenAI-совместимый API. Защита — мастер-ключ (Bearer) на каждый запрос:
# LiteLLM отклоняет запросы без верного ключа. TLS обязателен, т.к. ключ идёт по сети.
#
# Установка на LLM-хосте:
#   sudo cp nginx/edu.bularond.ru.conf /etc/nginx/sites-available/edu.bularond.ru
#   sudo ln -s /etc/nginx/sites-available/edu.bularond.ru /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d edu.bularond.ru

server {
    listen 80;
    listen [::]:80;
    server_name edu.bularond.ru;

    # Загрузка документов для RAG идёт через этот же API (эмбеддинги).
    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:4000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-стриминг ответов модели: без буферизации и с большими таймаутами,
        # иначе токены копятся/соединение рвётся с 504 (тем более с reasoning).
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering    off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # (Опционально, defense-in-depth) пускать только IP WebUI-хоста:
        # allow 203.0.113.10;   # <- публичный IP edu-ui.bularond.ru
        # deny all;
    }
}
