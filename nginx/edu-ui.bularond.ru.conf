# Reverse proxy для Open WebUI (WebUI-хост): edu-ui.bularond.ru -> 127.0.0.1:3001
#
# Установка на WebUI-хосте:
#   sudo cp nginx/edu-ui.bularond.ru.conf /etc/nginx/sites-available/edu-ui.bularond.ru
#   sudo ln -s /etc/nginx/sites-available/edu-ui.bularond.ru /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d edu-ui.bularond.ru

server {
    listen 80;
    listen [::]:80;
    server_name edu-ui.bularond.ru;

    # Загрузка файлов в чат (документы для RAG). Подними при необходимости.
    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:3001;

        # WebSocket — без этого чат Open WebUI не стримит ответы и «висит».
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Ответы модели идут долго — большие таймауты и стриминг без буфера.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering    off;
    }
}
