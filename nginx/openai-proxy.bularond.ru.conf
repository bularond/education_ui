# DO-хост: nginx-прокси на OpenAI. LiteLLM (в Yandex.Cloud) ходит сюда вместо
# api.openai.com напрямую. Ключ OpenAI НЕ хранится здесь — LiteLLM присылает его
# в заголовке Authorization, nginx лишь пробрасывает на api.openai.com.
#
# LiteLLM: OPENAI_PROXY_BASE_URL=https://openai-proxy.bularond.ru/v1
#
# Установка на DO-хосте:
#   sudo cp nginx/openai-proxy.bularond.ru.conf /etc/nginx/sites-available/openai-proxy.bularond.ru
#   sudo ln -s /etc/nginx/sites-available/openai-proxy.bularond.ru /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d openai-proxy.bularond.ru

server {
    listen 80;
    listen [::]:80;
    server_name openai-proxy.bularond.ru;

    client_max_body_size 50m;

    location / {
        # Форвардим на OpenAI. URI сохраняется: /v1/chat/completions -> api.openai.com/v1/chat/completions
        proxy_pass https://api.openai.com;

        # Host и SNI должны быть api.openai.com, иначе TLS/маршрутизация OpenAI отвергнут запрос.
        proxy_set_header Host api.openai.com;
        proxy_ssl_server_name on;
        proxy_ssl_name        api.openai.com;

        # Заголовок Authorization (ключ OpenAI) пробрасывается как есть — здесь не задаём.
        # Убираем клиентский Connection, чтобы не мешал keep-alive до OpenAI.
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # SSE-стриминг ответов: без буферизации и с большими таймаутами.
        proxy_buffering    off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # (Рекомендуется) не быть открытым релеем на OpenAI — пускать только YC-хост:
        # allow 203.0.113.20;   # <- публичный IP хоста в Yandex.Cloud
        # deny all;
    }
}
