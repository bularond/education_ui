services:
  # ---------------------------------------------------------------------------
  # eduproxy — лёгкий OpenAI-совместимый прокси (Go, ~15 МБ RAM) вместо LiteLLM.
  # Guardrail для tutor + проброс task/эмбеддингов + форвард в OpenAI.
  # Порт слушает только на localhost; наружу отдаётся через nginx (edu-llm.bularond.ru).
  # Open WebUI ходит в него по внутренней docker-сети (http://proxy:4000).
  # ---------------------------------------------------------------------------
  proxy:
    build: ./proxy
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      # Базовый URL OpenAI = nginx-прокси на DO-хосте (обход прямого доступа к OpenAI).
      OPENAI_PROXY_BASE_URL: ${OPENAI_PROXY_BASE_URL}
    volumes:
      # Промпт монтируем ридонли — правки без пересборки образа (нужен restart).
      - ./proxy/system_prompt.md:/system_prompt.md:ro
    ports:
      # Только на localhost — наружу проксирует nginx (edu-llm.bularond.ru -> :4000).
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD", "/proxy", "-healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Open WebUI — чат-интерфейс для учеников (аккаунты, история, регистрация).
  # ---------------------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    depends_on:
      proxy:
        condition: service_healthy
    ports:
      # Слушаем только на localhost — наружу ходит nginx (edu.bularond.ru -> :3001).
      # Порт приложения не доступен из интернета напрямую.
      - "127.0.0.1:3001:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      # Ходим в LLM только через наш прокси.
      OPENAI_API_BASE_URL: http://proxy:4000/v1
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY}

      # Аутентификация и регистрация.
      WEBUI_AUTH: "true"
      ENABLE_SIGNUP: "true"
      # Новые пользователи ждут одобрения администратора (первый юзер = админ).
      DEFAULT_USER_ROLE: "pending"
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      WEBUI_NAME: "Учебный помощник"

      # Служебные вызовы (заголовки/теги) — на модель без guardrail.
      TASK_MODEL_EXTERNAL: "task"
      ENABLE_TAGS_GENERATION: "true"

      # Эмбеддинги отдаём через прокси (OpenAI), а не локальной моделью —
      # иначе Open WebUI качает ~500МБ sentence-transformers при первом старте и виснет.
      RAG_EMBEDDING_ENGINE: "openai"
      RAG_EMBEDDING_MODEL: "text-embedding-3-small"
      RAG_OPENAI_API_BASE_URL: http://proxy:4000/v1
      RAG_OPENAI_API_KEY: ${LITELLM_MASTER_KEY}
      RAG_EMBEDDING_MODEL_AUTO_UPDATE: "false"

      # Урезаем права обычных пользователей: не дать менять модель/промпт под собой.
      USER_PERMISSIONS_CHAT_CONTROLS: "false"
      USER_PERMISSIONS_CHAT_SYSTEM_PROMPT: "false"
      # Отключаем то, что не нужно ученику и может отвлекать/тратить бюджет.
      ENABLE_COMMUNITY_SHARING: "false"
      ENABLE_OPENAI_API: "true"
      ENABLE_OLLAMA_API: "false"

volumes:
  open-webui-data:
