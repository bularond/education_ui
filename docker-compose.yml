services:
  # ---------------------------------------------------------------------------
  # LiteLLM — шлюз к OpenAI + принудительный образовательный промпт.
  # Наружу порт НЕ публикуется: доступен только другим сервисам в docker-сети.
  # ---------------------------------------------------------------------------
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    restart: unless-stopped
    # Монтируем в подпапку, чтобы НЕ перекрыть /app и его entrypoint образа.
    command: ["--config", "/app/project/config.yaml", "--port", "4000"]
    volumes:
      - ./litellm:/app/project
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      # Чтобы `callbacks: custom_callbacks.proxy_handler_instance` импортировался.
      PYTHONPATH: /app/project
    expose:
      - "4000"
    healthcheck:
      # В образе LiteLLM нет curl — проверяем через python.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Open WebUI — чат-интерфейс для учеников (аккаунты, история, регистрация).
  # ---------------------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_healthy
    ports:
      # Слушаем только на localhost — наружу ходит nginx (edu.bularond.ru -> :3001).
      # Порт приложения не доступен из интернета напрямую.
      - "127.0.0.1:3001:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      # Ходим в LLM только через LiteLLM.
      OPENAI_API_BASE_URL: http://litellm:4000/v1
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY}

      # Аутентификация и регистрация.
      WEBUI_AUTH: "true"
      ENABLE_SIGNUP: "true"
      # Новые пользователи ждут одобрения администратора (первый юзер = админ).
      DEFAULT_USER_ROLE: "pending"
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      WEBUI_NAME: "Учебный помощник"

      # Служебные вызовы (заголовки/теги) — на модель без guardrail.
      TASK_MODEL_EXTERNAL: "task"
      ENABLE_TAGS_GENERATION: "true"

      # Эмбеддинги отдаём через LiteLLM (OpenAI), а не локальной моделью —
      # иначе Open WebUI качает ~500МБ sentence-transformers при первом старте и виснет.
      RAG_EMBEDDING_ENGINE: "openai"
      RAG_EMBEDDING_MODEL: "text-embedding-3-small"
      RAG_OPENAI_API_BASE_URL: http://litellm:4000/v1
      RAG_OPENAI_API_KEY: ${LITELLM_MASTER_KEY}
      RAG_EMBEDDING_MODEL_AUTO_UPDATE: "false"

      # Урезаем права обычных пользователей: не дать менять модель/промпт под собой.
      USER_PERMISSIONS_CHAT_CONTROLS: "false"
      USER_PERMISSIONS_CHAT_SYSTEM_PROMPT: "false"
      # Отключаем то, что не нужно ученику и может отвлекать/тратить бюджет.
      ENABLE_COMMUNITY_SHARING: "false"
      ENABLE_OPENAI_API: "true"
      ENABLE_OLLAMA_API: "false"

volumes:
  open-webui-data:
