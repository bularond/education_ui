model_list:
  # Основная модель ученика. К ней применяется guardrail из custom_callbacks.py:
  # принудительный образовательный промпт + вырезание клиентских system-сообщений.
  - model_name: tutor
    litellm_params:
      model: openai/gpt-5.4-mini
      api_key: os.environ/OPENAI_API_KEY
      # gpt-5.4-mini — модель с рассуждением. Даём бюджет «подумать», иначе она
      # отвечает поверхностно и путается в арифметике/знаках при проверке шагов.
      reasoning_effort: high

  # Служебная модель для Open WebUI (заголовки чатов, теги, автодополнения).
  # НЕ попадает под guardrail — дешёвая и быстрая, без тьютор-промпта.
  - model_name: task
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # Эмбеддинги для RAG. Отдаём OpenAI, чтобы Open WebUI не качал локальную
  # sentence-transformers модель при старте (это блокирует и замедляет первый запуск).
  - model_name: text-embedding-3-small
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY

litellm_settings:
  # Регистрация pre-call хука, который внедряет образовательный промпт.
  callbacks: custom_callbacks.proxy_handler_instance
  # Не отдавать ошибки провайдера дословно клиенту.
  set_verbose: false

general_settings:
  # Мастер-ключ прокси. Open WebUI шлёт его как OPENAI_API_KEY.
  master_key: os.environ/LITELLM_MASTER_KEY

router_settings:
  # Сколько раз повторять при временных ошибках провайдера.
  num_retries: 2
  timeout: 120
